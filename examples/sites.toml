# Example multi-site sitemap configuration.
#
# Deploy this as the application-layer config so lib_layered_config discovers it,
# e.g. /etc/xdg/hugesitemap/config.toml (Linux app layer). All sites live in one
# file as an array of tables; no profiles are needed.
#
# Generate every site:        hugesitemap generate
# Generate selected sites:    hugesitemap generate --site docs,files
# Dry run / gzip:             hugesitemap generate --site docs --dry-run --gzip
#
# NOTE: keep the full [[site]] array in a single layer. lib_layered_config
# deep-merges nested tables but replaces lists wholesale (last writer wins), so a
# higher layer carrying a `site` array would replace this one rather than append.

# Global defaults shared by every site. Scalars (gzip, default_priority) are
# inherited unless a site overrides them; the global filters are PREPENDED to
# each site's own filters (extend), so the common excludes live here only once.
#
# Filtering uses git .gitignore semantics (via igittigitt): patterns are anchored
# at each directory root, a trailing slash ("drafts/") prunes a whole subtree, and
# "!pattern" re-includes. To index ONLY one kind, invert: ignore = ["*", "!*/",
# "!*.html"] keeps just .html (the "!*/" keeps directories so the walk descends).
[sitemap]
gzip             = false
default_priority = 0.5

  [sitemap.filters]
  ignore = ["*~", ".*", "*.txt", "*.log", "*.py"]

[[site]]
name        = "docs"
base_url    = "https://docs.example.com/"
output_path = "/srv/www/docs/sitemap.xml"

  [[site.directory]]
  path = "/srv/www/docs/guides"
  url  = "https://docs.example.com/guides/"

  [[site.directory]]
  path = "/srv/www/docs/api"
  url  = "https://docs.example.com/api/"

  [[site.url]]
  loc        = "https://docs.example.com/index.html"
  changefreq = "weekly"
  priority   = 1.0

  [site.filters]
  # Appended after the global patterns above; only the docs-specific extra here.
  # Trailing slash makes "drafts/" prune the directory and its whole subtree.
  ignore = ["drafts/"]

[[site]]
name        = "files"
base_url    = "https://files.example.com/"
output_path = "/srv/www/files/sitemap.xml"
gzip        = true                          # override the global default for this site

  [[site.directory]]
  path = "/srv/www/files/downloads"
  url  = "https://files.example.com/downloads/"

  [site.filters]
  # The other two filter sources (both optional). Rule precedence is: global
  # ignore < this site's ignore < ignore_file < the nested per-directory files
  # (deepest wins), exactly like git.
  ignore_file = "/srv/www/files/.sitemapignore"   # a .gitignore-format rule file
  nested_ignore_filename = ".sitemapignore"       # also honour one per subdirectory
